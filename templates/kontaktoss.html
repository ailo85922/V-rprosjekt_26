<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontakt oss - Second Hand Steeze</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #ebe9f7;
}

/* HEADER */
header {
  background-color: #2f347e;
  color: white;
  padding: 20px;
}

.header-content {
  position: relative;
  display: flex;
  align-items: center;
  height: 170px;
}

.logo {
  height: 170px;
  position: absolute;
  left: 20px;
}

.header-content h1 {
  width: 100%;
  text-align: center;
  margin: 0;
}

nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 10px;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* KONTAKT SIDE */
.contact-page {
  padding: 50px 20px;
  text-align: center;
}

.contact-box {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 10px;
}

.contact-box input,
.contact-box textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

.contact-box button {
  margin-top: 15px;
  padding: 10px;
  width: 100%;
  background: #2f347e;
  color: white;
  border: none;
}

/* FOOTER */
.footer {
  background: #222;
  color: white;
  padding: 30px;
  text-align: center;
}
</style>
</head>

<body>

<header>
  <div class="header-content">
    <img src="{{ url_for('static', filename='SHS_newlogo.png') }}" class="logo">
    <h1>Second Hand Steeze</h1>
  </div>

  <nav>
    <a href="/">Forside</a>
    <a href="/#products">Produkter</a>
    <a href="/contact">Kontakt oss</a>
  </nav>
</header>

<section class="contact-page">
  <h2>Kontakt oss</h2>

  <div class="contact-box">
    <form>
      <input type="text" placeholder="Navn" required>
      <input type="email" placeholder="E-post" required>
      <textarea placeholder="Melding" required></textarea>
      <button type="submit">Send</button>
    </form>

    <p>Kundeservice: support@secondhandsteeze.no</p>
  </div>
</section>

<div class="footer">
  <p>Second Hand Steeze ©</p>
</div>

</body>
</html>
