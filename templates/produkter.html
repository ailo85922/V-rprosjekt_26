<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produkter - Second Hand Steeze</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #ebe9f7;
}

/* HEADER */
header {
  background-color: #2f347e;
  color: white;
  padding: 20px;
}

.header-content {
  position: relative;
  display: flex;
  align-items: center;
  height: 170px;
}

.logo {
  height: 170px;
  position: absolute;
  left: 20px;
}

.header-content h1 {
  width: 100%;
  text-align: center;
  margin: 0;
}

nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 10px;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* PRODUKTER */
.products-page {
  padding: 40px;
}

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
}

.product {
  background: white;
  border-radius: 10px;
  padding: 15px;
  text-align: center;
}

.product img {
  width: 100%;
  border-radius: 10px;
}

/* FOOTER */
.footer {
  background: #222;
  color: white;
  padding: 30px;
  text-align: center;
}
</style>
</head>

<body>

<header>
  <div class="header-content">
    <img src="{{ url_for('static', filename='SHS_newlogo.png') }}" class="logo">
    <h1>Second Hand Steeze</h1>
  </div>

  <nav>
    <a href="/">Forside</a>
    <a href="/products">Produkter</a>
    <a href="/contact">Kontakt oss</a>
  </nav>
</header>

<section class="products-page">
  <h2>Produkter</h2>

  <div class="products-grid">

    <div class="product">
      <img src="https://via.placeholder.com/200">
      <h3>Vintage jakke</h3>
      <p>300 kr</p>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/200">
      <h3>Retro sneakers</h3>
      <p>500 kr</p>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/200">
      <h3>Denim jeans</h3>
      <p>200 kr</p>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/200">
      <h3>Hoodie</h3>
      <p>250 kr</p>
    </div>

  </div>
</section>

<div class="footer">
  <p>Second Hand Steeze ©</p>
</div>

</body>
</html>
